# Reusable guardrails check — other repos call this with one line:
#
#   jobs:
#     guardrails:
#       uses: rogeragerup-code/agertechai-guardrails/.github/workflows/check.yml@v1
#
# It checks out the CALLING repo, fetches the pinned guardrails script, and runs it.
name: guardrails

on:
  workflow_call:
    inputs:
      ref:
        description: "guardrails version tag to run (defaults to v1)"
        required: false
        type: string
        default: v1
      supabase_project_ref:
        description: "Supabase project ref — set it (plus the SUPABASE_ACCESS_TOKEN secret) to enable the database Security Advisor check. Leave empty to skip."
        required: false
        type: string
        default: ""
    secrets:
      SUPABASE_ACCESS_TOKEN:
        description: "Supabase personal/management access token for the Advisor check. Optional — the DB check skips when absent."
        required: false

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4

      - name: Fetch guardrails script
        uses: actions/checkout@v4
        with:
          repository: rogeragerup-code/agertechai-guardrails
          ref: ${{ inputs.ref }}
          path: .guardrails

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run guardrails (code)
        run: node .guardrails/guardrails.mjs .

      - name: Run Supabase Security Advisor (database)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ inputs.supabase_project_ref }}
        run: node .guardrails/db-advisor.mjs .
